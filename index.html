<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toronto Music</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand">GGR472</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Use Bootstrap navbar to link to Contact page
                    Set collapsible button for small screens -->
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Centre all text inside container and set background to black and text to white -->
    <div class="container text-center p-3 mb-2 bg-black text-white">

        <div class="row">
            <h1>Lindsey's GGR472 webpage</h1>
            <h2>Mapping Toronto's music venues</h2>
        </div>

        <!-- Row to display gif stored in Data folder
                Use Bootstrap grid system to set image to a width of four columns on medium screen and larger
                Use mx-auto to centre and img-fluid to adjust sizing-->
        <div class="row">
            <div class="col-md-4 mx-auto">
                <img src="Data/dancing.gif" class="img-fluid" alt="People dancing on a record">
            </div>
        </div>

        <div class="row">
            <p>View example GeoJSON file of music venues in
                <a target=”_blank” href="Data/torontomusicvenues.geojson">new window</a>
            </p>

            <p>
                See which are considered
                <a href="https://www.blogto.com/toronto/the_best_live_music_venues_in_toronto/">the best by BlogTo.
                </a>
                <br>Do you agree?
            </p>
        </div>

        <div class="row">
            <div class="col">
                <button type="button" class="btn btn-primary" id="btn-yes">Yes</button>
                <button type="button" class="btn btn-primary" id="btn-no">No</button>
            </div>
        </div>

        <div class="row">
            <p>Total votes in agreement:
                <span id="cnt-yes">0</span>
            </p>
            <p>Total votes against:
                <span id="cnt-no">0</span>
            </p>
        </div>

    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
        crossorigin="anonymous"></script>

</body>

</html>
